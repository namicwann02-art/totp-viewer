<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2FA Kodları</title>
<script>window.APP_VERSION = 41;</script>
<link rel="stylesheet" href="style.css?v=41">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <header>
    <h1>2FA Kodları</h1>
    <div class="progress-track"><div id="progress-bar" class="progress-fill"></div></div>
  </header>

  <main>
    <div id="status" class="status hidden"></div>

    <div id="empty-state" class="empty-state hidden">
      <p>Henüz hesap eklenmedi.</p>
      <p class="hint">Google Authenticator'da "Hesapları Aktar" ile oluşturduğunuz QR kodunun
      ekran görüntüsünü aşağıdaki butonla yükleyin. Secret'lar yalnızca bu cihazda saklanır.</p>
    </div>

    <ul id="account-list"></ul>
  </main>

  <footer>
    <button id="import-btn" class="import-btn">QR Kod İçe Aktar</button>
    <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden">
  </footer>

  <div id="sync-overlay" class="sync-overlay hidden">
    <div class="sync-modal" id="sync-modal-content"></div>
  </div>

  <div id="lightning-flash" class="lightning-flash">
    <svg class="lightning-bolt" viewBox="0 0 100 200" preserveAspectRatio="none">
      <path d="M58,0 L36,58 L54,64 L28,124 L50,130 L38,150 L60,156 L44,200"></path>
      <path d="M54,64 L72,80 L58,86" class="lightning-branch"></path>
    </svg>
  </div>

  <script src="vendor/jsQR.js?v=41"></script>
  <script src="totp.js?v=41"></script>
  <script src="migration-parser.js?v=41"></script>
  <script src="sync.js?v=41"></script>
  <script src="app.js?v=41"></script>
</body>
</html>
